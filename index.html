<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GeoCapture Bildviewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;--surf:#1a1d27;--brd:#2a2d3a;
  --acc:#7cb518;--acc2:#5a8a10;
  --txt:#e8eaf0;--mut:#8b8fa8;
  --red:#e05252;--blue:#4a9eff;
}
html,body{height:100%;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* в”Ђв”Ђ FILTERLEISTE в”Ђв”Ђ */
#fbar{background:var(--surf);border-bottom:1px solid var(--brd);padding:8px 10px;flex-shrink:0;position:relative}
#prog{height:3px;background:var(--acc);width:0%;transition:width .3s;position:absolute;top:0;left:0;right:0}
.qrow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.qb{background:var(--bg);border:1px solid var(--brd);color:var(--mut);border-radius:5px;
    padding:5px 11px;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.qb:hover{border-color:var(--acc);color:var(--txt)}
.qb.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:700}
.frow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.frow select,.frow input[type=date]{
  background:var(--bg);border:1px solid var(--brd);color:var(--txt);
  border-radius:5px;padding:5px 8px;font-size:12px;height:30px;cursor:pointer}
.frow select{min-width:130px}
.frow input[type=date]{width:130px}
.frow select:focus,.frow input:focus{outline:none;border-color:var(--acc)}
#btnLoad{background:var(--acc);border:none;color:#fff;border-radius:5px;
  padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;height:30px;white-space:nowrap}
#btnLoad:hover{background:var(--acc2)}
#btnLoad:disabled{opacity:.45;cursor:not-allowed}
#stat{font-size:11px;color:var(--mut);margin-top:5px;min-height:14px}
#stat.err{color:var(--red)}

/* в”Ђв”Ђ HAUPTBEREICH в”Ђв”Ђ */
#main{display:flex;flex:1;overflow:hidden}

/* в”Ђв”Ђ THUMBS (Desktop: links) в”Ђв”Ђ */
#tpane{width:110px;background:var(--surf);border-right:1px solid var(--brd);
  overflow-y:auto;overflow-x:hidden;flex-shrink:0;display:flex;flex-direction:column}
#tpane::-webkit-scrollbar{width:3px}
#tpane::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
.ti{width:100%;aspect-ratio:1;overflow:hidden;cursor:pointer;position:relative;
  border-bottom:1px solid var(--brd);flex-shrink:0;background:var(--bg)}
.ti img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .2s}
.ti img.loaded{opacity:1}
.ti.act::after{content:'';position:absolute;inset:0;border:3px solid var(--acc);pointer-events:none}
.ti .tb{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.72);
  color:#fff;font-size:9px;padding:2px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.tsp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.ring{width:20px;height:20px;border:2px solid var(--brd);border-top-color:var(--acc);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#tpager{padding:6px;display:flex;gap:4px;align-items:center;justify-content:center;
  border-top:1px solid var(--brd);flex-shrink:0}
#tpager button{background:var(--bg);border:1px solid var(--brd);color:var(--txt);
  border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer}
#tpager button:disabled{opacity:.3;cursor:not-allowed}
#tpager span{font-size:10px;color:var(--mut)}

/* в”Ђв”Ђ VIEWER в”Ђв”Ђ */
#viewer{flex:1;display:flex;flex-direction:column;overflow:hidden}
#iwrap{flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;background:#000;user-select:none}
#mimg{max-width:100%;max-height:100%;object-fit:contain;display:none;transition:opacity .15s}
#ph{color:var(--mut);font-size:15px;text-align:center;padding:20px}
.nb{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.15);color:#fff;width:40px;height:60px;
  border-radius:6px;font-size:20px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;z-index:10;transition:background .15s}
.nb:hover{background:rgba(0,0,0,.85)}
#navP{left:8px}#navN{right:8px}

/* в”Ђв”Ђ INFO-LEISTE в”Ђв”Ђ */
#ibar{background:var(--surf);border-top:1px solid var(--brd);padding:10px 14px;flex-shrink:0}
#iproj{font-size:20px;font-weight:800;color:var(--acc);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;line-height:1.2}
#idate{font-size:16px;font-weight:700;color:var(--txt);margin-top:3px}
#imeta{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;align-items:center}
.mi{font-size:12px;color:var(--mut);display:flex;align-items:center;gap:4px}
.mi strong{color:var(--txt)}
.bdg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.bf{background:#1e3a5f;color:#4a9eff}
.bd{background:#2a1e3a;color:#b06aff}
.bok{background:#1a3a1a;color:#5adb5a}
.bdn{background:#1a2a3a;color:#4a9eff}
.bop{background:#3a2a1a;color:#ffaa4a}
.brj{background:#3a1a1a;color:#ff5a5a}
#iact{display:flex;gap:8px;margin-top:8px}
#iact button{background:var(--bg);border:1px solid var(--brd);color:var(--txt);
  border-radius:5px;padding:5px 12px;font-size:12px;cursor:pointer}
#iact button:hover{border-color:var(--acc);color:var(--acc)}
#icnt{font-size:11px;color:var(--mut);margin-left:auto;align-self:flex-end}

/* в”Ђв”Ђ LIGHTBOX в”Ђв”Ђ */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);
  z-index:1000;align-items:center;justify-content:center}
#lb.open{display:flex}
#lb img{max-width:98vw;max-height:98vh;object-fit:contain}
#lbX{position:absolute;top:12px;right:16px;color:#fff;font-size:30px;
  cursor:pointer;background:none;border:none;line-height:1}

/* в”Ђв”Ђ MOBILE в‰¤768px в”Ђв”Ђ */
@media(max-width:768px){
  #main{flex-direction:column}
  #tpane{width:100%;height:88px;flex-direction:row;overflow-x:auto;overflow-y:hidden;
    border-right:none;border-top:1px solid var(--brd);order:2}
  .ti{width:80px;height:80px;flex-shrink:0;border-bottom:none;border-right:1px solid var(--brd)}
  #tpager{display:none}
  #viewer{order:1}
  #iproj{font-size:15px}
  #idate{font-size:13px}
  .frow select{min-width:110px}
  .frow input[type=date]{width:112px}
  .nb{width:32px;height:50px;font-size:16px}
}
@media(max-width:480px){
  .qb{font-size:11px;padding:4px 8px}
  .frow select,.frow input{font-size:11px}
  .frow input[type=date]{width:105px}
  #iproj{font-size:14px}
  #idate{font-size:12px}
}
</style>
</head>
<body>
<div id="app">

  <!-- FILTERLEISTE -->
  <div id="fbar">
    <div id="prog"></div>
    <div class="qrow">
      <button class="qb on" data-q="today"     onclick="setQ('today')">Heute</button>
      <button class="qb"    data-q="yesterday" onclick="setQ('yesterday')">Gestern</button>
      <button class="qb"    data-q="week"      onclick="setQ('week')">Diese Woche</button>
      <button class="qb"    data-q="month"     onclick="setQ('month')">Dieser Monat</button>
      <button class="qb"    data-q="lastmonth" onclick="setQ('lastmonth')">Letzter Monat</button>
      <button class="qb"    data-q="year"      onclick="setQ('year')">Dieses Jahr</button>
      <button class="qb"    data-q="all"       onclick="setQ('all')">Alle</button>
    </div>
    <div class="frow">
      <input type="date" id="fFrom">
      <input type="date" id="fTo">
      <select id="fProj"><option value="">Alle Projekte</option></select>
      <select id="fEmp"><option value="">Alle Erfasser</option></select>
      <select id="fStat">
        <option value="">Alle Status</option>
        <option value="FILLED">AusgefГјllt</option>
        <option value="FINISHED">Abgeschlossen</option>
        <option value="OPEN">Offen</option>
        <option value="REJECTED">Abgelehnt</option>
        <option value="DOC">Dokument</option>
      </select>
      <select id="fForm"><option value="">Alle Formulare</option></select>
      <button id="btnLoad" onclick="loadAll()">&#9654; Laden</button>
    </div>
    <div id="stat"></div>
  </div>

  <!-- HAUPTBEREICH -->
  <div id="main">
    <div id="tpane"></div>
    <div id="viewer">
      <div id="iwrap">
        <div id="ph">Zeitraum wГ¤hlen und Laden klicken</div>
        <img id="mimg" src="" alt="" onclick="openLB()">
        <button class="nb" id="navP" onclick="nav(-1)">&#8249;</button>
        <button class="nb" id="navN" onclick="nav(1)">&#8250;</button>
      </div>
      <div id="ibar">
        <div id="iproj">вЂ”</div>
        <div id="idate">вЂ”</div>
        <div id="imeta">
          <span class="mi" id="memp"></span>
          <span class="mi" id="mform"></span>
          <span class="mi" id="msrc"></span>
          <span class="mi" id="mst"></span>
          <span id="icnt" class="mi"></span>
        </div>
        <div id="iact">
          <button onclick="dlCurrent()">&#8595; Download</button>
          <button onclick="openLB()">&#9974; Vollbild</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lb" onclick="closeLB()">
  <button id="lbX" onclick="closeLB()">&#10005;</button>
  <img id="lbImg" src="" alt="">
</div>

<script>
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// KONFIGURATION
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
const KEY  = '66781e96424b5a2f94397357d797770a';
const BASE = 'https://app.geocapture.net/api';
const PAGE_SIZE = 100; // Bilder pro API-Seite

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// STATE
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
let allImgs  = [];
let filtered = [];
let curIdx   = 0;
let tPage    = 0;
const TPP    = 50; // Thumbs pro Seite (Desktop)
let projects = {};
let employees= {};
let formSet  = new Set();
let loadTok  = 0;

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// UTILS
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const isoDate = d => d.toISOString().split('T')[0];
const today   = () => isoDate(new Date());
const fmtDate = s => {
  if(!s) return 'вЂ”';
  const d = new Date(s);
  return isNaN(d) ? s : d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
};
const sleep = ms => new Promise(r=>setTimeout(r,ms));

function setProgress(p){ $('prog').style.width = p+'%'; }
function setStatus(msg,err){
  const el=$('stat'); el.textContent=msg; el.className=err?'err':'';
}

async function apiGet(path){
  const sep = path.includes('?')?'&':'?';
  const url = BASE+path+sep+'apitoken='+KEY;
  const r = await fetch(url);
  if(!r.ok){
    if(r.status===400||r.status===404) return null;
    throw new Error('HTTP '+r.status);
  }
  return r.json();
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// SCHNELLFILTER
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function setQ(q){
  const now = new Date();
  let from, to = today();
  if(q==='today')     { from=today(); }
  else if(q==='yesterday'){ const y=new Date(now); y.setDate(y.getDate()-1); from=to=isoDate(y); }
  else if(q==='week') { const d=new Date(now); d.setDate(d.getDate()-d.getDay()+(d.getDay()===0?-6:1)); from=isoDate(d); }
  else if(q==='month'){ from=isoDate(new Date(now.getFullYear(),now.getMonth(),1)); }
  else if(q==='lastmonth'){ const lm=new Date(now.getFullYear(),now.getMonth()-1,1); const le=new Date(now.getFullYear(),now.getMonth(),0); from=isoDate(lm); to=isoDate(le); }
  else if(q==='year') { from=now.getFullYear()+'-01-01'; }
  else if(q==='all')  { from='2000-01-01'; }
  $('fFrom').value=from; $('fTo').value=to;
  document.querySelectorAll('.qb').forEach(b=>b.classList.remove('on'));
  document.querySelector('[data-q="'+q+'"]').classList.add('on');
  loadAll();
}
['fFrom','fTo'].forEach(id=>$(id).addEventListener('change',()=>{
  document.querySelectorAll('.qb').forEach(b=>b.classList.remove('on'));
}));

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// STAMMDATEN
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
async function loadMaster(){
  try{
    const pd = await apiGet('/project/fetch?limit=500');
    if(pd?.result?.data){
      pd.result.data.forEach(p=>{ projects[p.id]=p.name||('Projekt '+p.id); });
      const sel=$('fProj');
      sel.innerHTML='<option value="">Alle Projekte</option>';
      pd.result.data.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(p=>{
        sel.insertAdjacentHTML('beforeend',`<option value="${p.id}">${esc(p.name||p.id)}</option>`);
      });
    }
  }catch(e){console.warn('Projekte:',e);}
  try{
    const ed = await apiGet('/employee/fetch?limit=500');
    if(ed?.result?.data){
      ed.result.data.forEach(e=>{
        employees[e.id]=((e.lastName||'')+(e.firstName?', '+e.firstName:'')).trim()||('MA '+e.id);
      });
      const sel=$('fEmp');
      sel.innerHTML='<option value="">Alle Erfasser</option>';
      ed.result.data.sort((a,b)=>(a.lastName||'').localeCompare(b.lastName||'')).forEach(e=>{
        sel.insertAdjacentHTML('beforeend',`<option value="${e.id}">${esc((e.lastName||'')+(e.firstName?', '+e.firstName:''))}</option>`);
      });
    }
  }catch(e){console.warn('Mitarbeiter:',e);}
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// ALLE BILDER LADEN (mit Pagination)
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
async function loadAll(){
  const tok = ++loadTok;
  const from = $('fFrom').value;
  const to   = $('fTo').value;
  if(!from||!to){ setStatus('Bitte Datum wГ¤hlen.',true); return; }

  $('btnLoad').disabled=true;
  allImgs=[]; filtered=[];
  renderThumbs(); clearViewer();
  setProgress(5);
  setStatus('Lade DatenвЂ¦');

  try{
    // в”Ђв”Ђ 1. FORMULARDATEN-BILDER (alle Seiten) в”Ђв”Ђ
    setStatus('Lade Formular-BilderвЂ¦');
    let formFiles = [];
    let offset = 0;
    let pagesDone = 0;

    while(true){
      if(tok!==loadTok) return;
      const url = `/custom_form_data/media?limit=${PAGE_SIZE}&offset=${offset}&filter[from]=${from}&filter[to]=${to}`;
      let data;
      try{ data = await apiGet(url); }catch(e){ break; }
      if(!data) break;
      const files = data.result?.files || data.result?.data || [];
      if(files.length===0) break;
      formFiles.push(...files);
      offset += files.length;
      pagesDone++;
      setStatus(`Formular-Bilder: ${formFiles.length} geladenвЂ¦`);
      if(files.length < PAGE_SIZE) break; // letzte Seite
      await sleep(200);
    }

    // Metadaten fГјr alle customFormDataIds holen
    const ids = [...new Set(formFiles.map(f=>f.customFormDataId))];
    const metaMap = {};
    for(let i=0;i<ids.length;i+=50){
      if(tok!==loadTok) return;
      const chunk = ids.slice(i,i+50);
      try{
        const fd = await apiGet('/custom_form_data/fetch?limit=50&filter[byIds]='+chunk.join(','));
        if(fd?.result?.data) fd.result.data.forEach(item=>{ metaMap[item.id]=item; });
      }catch(e){}
      await sleep(100);
    }

    const formImages = formFiles.map(f=>{
      const meta = metaMap[f.customFormDataId]||{};
      const proj = meta.project||{};
      const emp  = meta.employee||{};
      const def  = meta.customFormDefinition||{};
      const projName = proj.name||projects[proj.id]||'вЂ”';
      const empName  = emp.lastName?(emp.lastName+(emp.firstName?', '+emp.firstName:'')):employees[emp.id]||'вЂ”';
      const formName = def.name||'Formular';
      formSet.add(formName);
      return {
        id: f.customFormDataId,
        filename: f.filename,
        date: meta.date||from,
        projectId: proj.id||'',
        projectName: projName,
        empName, empId: emp.id||'',
        formName,
        status: meta.status||'',
        source: 'FORM',
        imgUrl: `${BASE}/custom_form_data/mediaData?formDataId=${f.customFormDataId}&filename=${encodeURIComponent(f.filename)}&apitoken=${KEY}`
      };
    });

    if(tok!==loadTok) return;
    setProgress(45);

    // в”Ђв”Ђ 2. PROJEKTDOKUMENTE (alle Projekte, alle Seiten) в”Ђв”Ђ
    setStatus('Lade ProjektdokumenteвЂ¦');
    let docImages = [];
    const projIds = Object.keys(projects);
    const IMG_EXT = new Set(['.jpg','.jpeg','.png','.gif','.webp','.bmp','.tiff','.heic']);

    for(let i=0;i<projIds.length;i+=3){
      if(tok!==loadTok) return;
      const chunk = projIds.slice(i,i+3);
      const results = await Promise.all(chunk.map(async pid=>{
        let docs=[];
        let off=0;
        while(true){
          let url = `/file/fetch?filter[ownerType]=PROJECT&filter[ownerId]=${pid}&limit=500&offset=${off}`;
          if(from!=='2000-01-01') url+=`&filter[from]=${from}&filter[to]=${to}`;
          let fd;
          try{ fd=await apiGet(url); }catch(e){ break; }
          if(!fd?.result?.data||fd.result.data.length===0) break;
          const imgs = fd.result.data.filter(f=>IMG_EXT.has((f.extension||'').toLowerCase()));
          imgs.forEach(f=>docs.push({
            id: f.id,
            filename: f.subject||String(f.id),
            date: f.date||from,
            projectId: pid,
            projectName: projects[pid]||'вЂ”',
            empName: 'вЂ”', empId: '',
            formName: f.type||'Dokument',
            status: 'DOC',
            source: 'DOC',
            imgUrl: `${BASE}/file/fetch_file?id=${f.id}&apitoken=${KEY}`
          }));
          off+=fd.result.data.length;
          if(fd.result.data.length<500) break;
          await sleep(150);
        }
        return docs;
      }));
      results.forEach(r=>docImages.push(...r));
      setProgress(45+Math.round((i/projIds.length)*50));
      if(i+3<projIds.length) await sleep(400);
    }

    if(tok!==loadTok) return;

    // в”Ђв”Ђ ZUSAMMENFГњHREN в”Ђв”Ђ
    allImgs = [...formImages,...docImages];
    allImgs.sort((a,b)=>(b.date||'').localeCompare(a.date||''));

    // Formular-Dropdown
    const fsel=$('fForm');
    fsel.innerHTML='<option value="">Alle Formulare</option>';
    [...formSet].sort().forEach(n=>{
      fsel.insertAdjacentHTML('beforeend',`<option value="${esc(n)}">${esc(n)}</option>`);
    });

    setProgress(100);
    applyFilter();
    setStatus(`${allImgs.length} Bilder geladen (${formImages.length} Formulare, ${docImages.length} Dokumente)`);

  }catch(e){
    setStatus('Fehler: '+e.message,true);
  }finally{
    $('btnLoad').disabled=false;
    setTimeout(()=>setProgress(0),800);
  }
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// FILTER
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function applyFilter(){
  const proj = $('fProj').value;
  const emp  = $('fEmp').value;
  const stat = $('fStat').value;
  const form = $('fForm').value;
  const from = $('fFrom').value;
  const to   = $('fTo').value;

  filtered = allImgs.filter(img=>{
    if(proj && String(img.projectId)!==String(proj)) return false;
    if(emp  && String(img.empId)!==String(emp))      return false;
    if(stat){
      if(stat==='DOC'&&img.source!=='DOC') return false;
      if(stat!=='DOC'&&img.status!==stat)  return false;
    }
    if(form && img.formName!==form) return false;
    if(from && img.date<from) return false;
    if(to   && img.date>to)   return false;
    return true;
  });

  tPage=0; curIdx=0;
  renderThumbs();
  if(filtered.length>0) showImg(0);
  else clearViewer();
}
['fProj','fEmp','fStat','fForm'].forEach(id=>$(id).addEventListener('change',applyFilter));

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// THUMBNAILS
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function renderThumbs(){
  const pane=$('tpane');
  pane.innerHTML='';
  const mobile = window.innerWidth<=768;
  const start  = mobile?0:tPage*TPP;
  const end    = mobile?filtered.length:start+TPP;
  const slice  = filtered.slice(start,end);

  slice.forEach((img,i)=>{
    const ri=start+i;
    const div=document.createElement('div');
    div.className='ti'+(ri===curIdx?' act':'');
    div.onclick=()=>showImg(ri);

    const sp=document.createElement('div');
    sp.className='tsp';
    sp.innerHTML='<div class="ring"></div>';
    div.appendChild(sp);

    const im=document.createElement('img');
    im.alt='';
    im.onload =()=>{ im.classList.add('loaded'); sp.remove(); };
    im.onerror=()=>{ sp.innerHTML='<span style="font-size:16px;color:var(--mut)">вњ•</span>'; };
    div.appendChild(im);

    const badge=document.createElement('div');
    badge.className='tb';
    badge.textContent=img.projectName!=='вЂ”'?img.projectName:img.formName;
    div.appendChild(badge);

    pane.appendChild(div);

    // Lazy Load via IntersectionObserver
    const obs=new IntersectionObserver(en=>{
      if(en[0].isIntersecting){ im.src=img.imgUrl; obs.disconnect(); }
    },{root:pane,rootMargin:'150px'});
    obs.observe(div);
  });

  // Pagination (nur Desktop)
  if(!mobile && filtered.length>TPP){
    const total=Math.ceil(filtered.length/TPP);
    const pg=document.createElement('div');
    pg.id='tpager';
    const bp=document.createElement('button'); bp.textContent='вЂ№'; bp.disabled=tPage===0;
    bp.onclick=()=>{ tPage--; renderThumbs(); };
    const bn=document.createElement('button'); bn.textContent='вЂє'; bn.disabled=tPage>=total-1;
    bn.onclick=()=>{ tPage++; renderThumbs(); };
    const lbl=document.createElement('span'); lbl.textContent=(tPage+1)+' / '+total;
    pg.appendChild(bp); pg.appendChild(lbl); pg.appendChild(bn);
    pane.appendChild(pg);
  }
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// BILD ANZEIGEN
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function showImg(idx){
  if(idx<0||idx>=filtered.length) return;
  curIdx=idx;
  const img=filtered[idx];
  const mi=$('mimg'), ph=$('ph');

  mi.style.opacity='0';
  mi.style.display='block';
  ph.style.display='none';
  mi.onload =()=>{ mi.style.opacity='1'; };
  mi.onerror=()=>{ mi.style.display='none'; ph.style.display='block'; ph.textContent='Bild nicht ladbar'; };
  mi.src=img.imgUrl;

  $('iproj').textContent = img.projectName||'вЂ”';
  $('idate').textContent = fmtDate(img.date);

  $('memp').innerHTML  = img.empName!=='вЂ”'?`<strong>${esc(img.empName)}</strong>`:'';
  $('mform').innerHTML = img.formName?`<span style="color:var(--mut)">Formular:</span> <strong>${esc(img.formName)}</strong>`:'';
  $('msrc').innerHTML  = img.source==='FORM'?'<span class="bdg bf">Formular</span>':'<span class="bdg bd">Dokument</span>';

  const SL={FILLED:'AusgefГјllt',FINISHED:'Abgeschlossen',OPEN:'Offen',REJECTED:'Abgelehnt',DOC:'Dokument'};
  const SC={FILLED:'bok',FINISHED:'bdn',OPEN:'bop',REJECTED:'brj',DOC:'bd'};
  const st=img.status||(img.source==='DOC'?'DOC':'');
  $('mst').innerHTML = st?`<span class="bdg ${SC[st]||''}">${SL[st]||st}</span>`:'';
  $('icnt').textContent = (idx+1)+' / '+filtered.length;

  // Aktives Thumb
  const mobile=window.innerWidth<=768;
  const pane=$('tpane');
  pane.querySelectorAll('.ti').forEach((el,i)=>{
    const ri=mobile?i:tPage*TPP+i;
    el.classList.toggle('act',ri===idx);
  });
  const localIdx=mobile?idx:idx-tPage*TPP;
  const thumbEls=pane.querySelectorAll('.ti');
  if(thumbEls[localIdx]) thumbEls[localIdx].scrollIntoView({behavior:'smooth',block:mobile?'nearest':'center',inline:mobile?'center':'nearest'});
}

function clearViewer(){
  const mi=$('mimg'), ph=$('ph');
  mi.src=''; mi.style.display='none';
  ph.style.display='block';
  ph.textContent=filtered.length===0&&allImgs.length>0?'Keine Bilder fГјr diesen Filter':'Keine Bilder gefunden';
  $('iproj').textContent='вЂ”'; $('idate').textContent='вЂ”';
  ['memp','mform','msrc','mst','icnt'].forEach(id=>$(id).innerHTML='');
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// NAVIGATION
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function nav(dir){
  const next=curIdx+dir;
  if(next<0||next>=filtered.length) return;
  const mobile=window.innerWidth<=768;
  if(!mobile){
    const np=Math.floor(next/TPP);
    if(np!==tPage){ tPage=np; renderThumbs(); }
  }
  showImg(next);
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')  nav(-1);
  if(e.key==='ArrowRight') nav(1);
  if(e.key==='Escape') closeLB();
});

// Swipe Touch
let sx=0,sy=0,st2=0;
const iw=$('iwrap');
iw.addEventListener('touchstart',e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; st2=Date.now(); },{passive:true});
iw.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx;
  const dy=e.changedTouches[0].clientY-sy;
  const dt=Date.now()-st2;
  if(Math.abs(dx)>80&&Math.abs(dx)>Math.abs(dy)*1.5&&dt<500) nav(dx<0?1:-1);
},{passive:true});

// Maus-Drag
let md=false,mx=0;
iw.addEventListener('mousedown',e=>{ md=true; mx=e.clientX; });
iw.addEventListener('mouseup',  e=>{ if(!md)return; md=false; const dx=e.clientX-mx; if(Math.abs(dx)>60) nav(dx<0?1:-1); });
iw.addEventListener('mouseleave',()=>{ md=false; });

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// LIGHTBOX
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function openLB(){
  if(!filtered[curIdx]) return;
  $('lbImg').src=filtered[curIdx].imgUrl;
  $('lb').classList.add('open');
}
function closeLB(){ $('lb').classList.remove('open'); }

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// DOWNLOAD
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
async function dlCurrent(){
  if(!filtered[curIdx]) return;
  const img=filtered[curIdx];
  try{
    const r=await fetch(img.imgUrl);
    const blob=await r.blob();
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=img.filename||('bild_'+img.id);
    a.click();
    URL.revokeObjectURL(a.href);
  }catch(e){ alert('Download fehlgeschlagen: '+e.message); }
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

(async()=>{
  await loadMaster();
  setQ('today');
})();
</script>
